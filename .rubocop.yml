AllCops:
  TargetRubyVersion: 3.1

plugins:
  - rubocop-numbered-params
  - rubocop-rake

Layout/LeadingCommentSpace:
  AllowRBSInlineAnnotation: true

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  Enabled: true
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  Enabled: true
  EnforcedStyle: double_quotes

Layout/BlockLength:
  Exclude:
    - "spec/**/*_spec.rb"

Layout/LineLength:
  Max: 120

Layout/MethodLength:
  Max: 20
